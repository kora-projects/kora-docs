# Repository
repo_name: Kora
repo_url: https://github.com/kora-projects/kora
edit_uri: /kora-projects/kora-docs/tree/master/mkdocs/docs/en


# Configuration
theme:
  name: material
  custom_dir: ../../overrides/
  favicon: assets/img/kora.ico
  logo: assets/img/kora-big.png
  language: en
  icon:
    # https://squidfunk.github.io/mkdocs-material/reference/icons-emojis/
    repo: fontawesome/brands/git
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/lightbulb-auto
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: orange
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: orange
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - header.autohide
    - toc.follow
    - content.code.copy
    - content.action.edit
    - content.code.annotate   # https://squidfunk.github.io/mkdocs-material/reference/code-blocks/?h=annotations#adding-annotations
    - content.tabs.link


extra_css:
  - assets/css/extra.css         # https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/#content-area-width


# Structure - https://github.com/squidfunk/mkdocs-material/discussions/2346
extra:
  analytics:
    provider: counter
    property: counter
  generator: false
  annotate:
    json: [ .s2 ]   # https://squidfunk.github.io/mkdocs-material/reference/code-blocks/?h=annotations#custom-selectors
  alternate:
    - name: Русский
      link: /kora-docs/ru/
      lang: ru
    - name: English
      link: /kora-docs/en/
      lang: en
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kora-projects/kora
      name: "GitHub project"
    - icon: fontawesome/brands/telegram
      link: https://t.me/kora_users
      name: "Telegram project chat"



plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
      lang:
        - en
  - glightbox               # https://squidfunk.github.io/mkdocs-material/reference/images/#lightbox


# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html              # https://squidfunk.github.io/mkdocs-material/reference/annotations/#tab-1
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.betterem
  - pymdownx.tabbed:        # https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown-extensions/?h=tabbed#tabbed
      alternate_style: true
      separator: "-"
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      options:
        custom_icons:
          - overrides/.icons
  - toc:
      permalink: true
  - meta
